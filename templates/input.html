{% extends "base.html" %}
{% block content %}
    <h1>Add New Task</h1>

    <!-- This datalist powers the autocomplete on the project_title field below. -->
    <!-- It's already wired up — the options come from projects already in tasks.csv. -->
    <datalist id="project-suggestions">
        {% for p in projects %}
        <option value="{{ p }}">
        {% endfor %}
    </datalist>

    <form action="/input" method="POST">
  <input type="text" name="project_title" list="project-suggestions" placeholder="Project Title">

  <input type="text" name="title" placeholder="Title">

  <textarea name="description" placeholder="Description"></textarea>

  <select name="status">
    <option value="In Progress">In Progress</option>
    <option value="Blocked">Blocked</option>
    <option value="Done">Done</option>
  </select>

  <input type="text" name="next_steps" placeholder="Next Steps">

  <button type="submit">Submit</button>
</form>
    <p><em>Build your form here!</em></p>
    <p><a href="{{ url_for('display') }}">View existing tasks</a></p>
{% endblock %}
